services:
  - type: worker
    name: french-coach-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DB_PATH
        value: /data/french_coach.db
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
